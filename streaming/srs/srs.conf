# SRS — traducteur WHIP (WebRTC) → RTMP interne, pour relais vers Facebook (RTMPS).
#
# Le studio (navigateur) publie sa sortie programme en WHIP. SRS transcode l'audio
# Opus→AAC et passe la vidéo H264 en l'état vers un flux RTMP INTERNE. Le backend
# Laravel relaie ensuite ce flux vers Facebook via ffmpeg (leg TLS/RTMPS), avec la
# clé du client — la clé ne quitte jamais notre infra.
#
# Ports :
#   1985/tcp  API HTTP + endpoint WHIP  → à placer DERRIÈRE un reverse-proxy HTTPS
#             (le navigateur est en https, un POST WHIP en http est bloqué = mixed
#             content).
#   8000/udp  média WebRTC (ICE) — doit être ouvert ; `candidate` = IP publique VPS.
#   1935/tcp  RTMP interne — publié seulement sur 127.0.0.1, lu par le relais ffmpeg.

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       warn;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    # Serve the HLS output dir. SRS adds `Access-Control-Allow-Origin: *` so the
    # Next.js /live player (hls.js) can fetch the manifest + segments cross-origin.
    dir             ./objs/nginx/html;
    crossdomain     on;
}

rtc_server {
    enabled         on;
    listen          8000; # UDP — média WebRTC
    # IP publique du VPS, annoncée aux navigateurs pour l'ICE (fournie via l'env
    # CANDIDATE dans docker-compose). Sans elle, la connexion WebRTC échoue.
    candidate       $CANDIDATE;
}

vhost __defaultVhost__ {
    rtc {
        enabled     on;
        # Convertit le WebRTC entrant (WHIP) en RTMP interne : audio Opus→AAC
        # transcodé, vidéo H264 en passthrough → le navigateur DOIT publier H264
        # (forcé côté client dans whip-publisher.ts).
        rtc_to_rtmp on;
        keep_bframe off;
    }

    # Muxe le même flux programme en HLS pour le site public (page /live). SRS
    # écrit [app]/[stream].m3u8 + segments dans le dir du http_server, servis en
    # 8080 → URL publique http://<host>:8088/live/<stream>.m3u8. Fragments de 2 s,
    # fenêtre 30 s : le lecteur (hls.js) garde ~6 s de coussin et tolère jusqu'à
    # ~24 s de latence — la fenêtre doit être PLUS LARGE que ce coussin, sinon les
    # segments expirent avant lecture (404 → coupures). Le flux WebRTC entrant a
    # une cadence de keyframes irrégulière → SRS coupe les segments au keyframe
    # (`hls_wait_keyframe on` par défaut), d'où l'intérêt d'un buffer confortable.
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      30;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
        hls_cleanup     on;
        hls_dispose     30;
    }

    http_hooks {
        enabled      on;
        # Autorisation + orchestration du relais Facebook côté Laravel — même
        # pattern que le nginx-rtmp existant (rtmp/auth). Adapte l'hôte à ton API.
        on_publish   http://host.docker.internal:8001/api/v1/public/srs/on_publish;
        on_unpublish http://host.docker.internal:8001/api/v1/public/srs/on_unpublish;
    }
}
