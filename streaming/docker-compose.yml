services:
  rtmp:
    image: alfg/nginx-rtmp        # nginx with the RTMP module precompiled
    container_name: mfm-rtmp
    ports:
      - "1935:1935"               # RTMP ingest (OBS → rtmp://server:1935/live)
      # Host 8088 → container 8080 (8080 is taken by Laravel Reverb on the host).
      - "8088:8080"               # HLS delivery (http://server:8088/hls/<key>.m3u8)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./on-record-done.sh:/usr/local/bin/on-record-done.sh:ro
      # Recordings land directly in the API's public storage so the stream route
      # can serve them and they can be attached to the archive.
      - ../church-api/storage/app/public/lives/recordings:/recordings
    # Bypass the image's envsubst entrypoint (it tries to *write* nginx.conf, which
    # fails on our read-only mount). Ensure the HLS/recordings dirs exist, run config.
    # chmod 777 so the unprivileged nginx worker (nobody) can write recordings
    # into the bind-mounted dir owned by the host user.
    entrypoint: ["/bin/sh", "-c", "mkdir -p /tmp/hls /recordings && chmod 777 /recordings && nginx -g 'daemon off;'"]
    # Lets the container reach the Laravel API on the host (on_publish callback).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
