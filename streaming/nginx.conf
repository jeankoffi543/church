worker_processes auto;
events { worker_connections 1024; }

# ── RTMP ingest (OBS pushes here) → segmented to HLS ──────────────────
rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;

      # Authorize the publish against the Laravel API (stream-key check).
      # OBS pushes rtmp://server/live/<key>; Nginx POSTs name=<key> here and
      # only starts the stream on a 2xx response. Point this at your API host:
      #   - Docker Desktop (mac/win): http://host.docker.internal:8001/...
      #   - Linux: enable extra_hosts in docker-compose.yml (already set)
      on_publish http://host.docker.internal:8001/api/v1/public/rtmp/auth;

      # When OBS stops, auto-archive the broadcast (metadata + chat) and cut the
      # live — same as the admin "Arrêter le direct" button.
      on_publish_done http://host.docker.internal:8001/api/v1/public/rtmp/done;

      # Generate HLS fragments. Lower = less latency (keep OBS keyframe = 1s so
      # fragments are cut cleanly at 1s; otherwise the real fragment length is the
      # time to the next keyframe and latency balloons).
      hls on;
      hls_path /tmp/hls;
      hls_fragment 1s;
      hls_playlist_length 6s;

      # Clients must consume HLS over HTTP, not RTMP directly.
      deny play all;

      # Record each broadcast (FLV), remux to MP4, then notify the API so the
      # recording is attached to the just-archived broadcast for replay.
      # $path = recorded FLV, $basename = filename w/o ext, $name = stream key.
      record all;
      record_path /recordings;
      record_suffix .flv;
      record_unique on;
      exec_record_done /bin/sh /usr/local/bin/on-record-done.sh $path $name;
    }
  }
}

# ── HTTP delivery of the HLS playlist + segments ──────────────────────
http {
  server {
    listen 8080;

    # CORS so the Next.js player (hls.js) can fetch the manifest cross-origin.
    add_header Access-Control-Allow-Origin * always;

    location /hls {
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      root /tmp;                       # /hls/<key>.m3u8 → /tmp/hls/<key>.m3u8
      add_header Cache-Control no-cache always;
      add_header Access-Control-Allow-Origin * always;
    }

    # Lightweight health check.
    location = /healthz {
      return 200 "ok\n";
    }
  }
}
