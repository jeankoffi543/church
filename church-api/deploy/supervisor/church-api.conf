; ---------------------------------------------------------------------------
; Supervisor — church-api realtime + async processes (CHR-158)
; ---------------------------------------------------------------------------
; Keeps the Reverb WebSocket server, the queue workers and the scheduler alive
; and restarts them on crash/deploy. Install:
;
;   sudo cp deploy/supervisor/church-api.conf /etc/supervisor/conf.d/
;   sudo supervisorctl reread && sudo supervisorctl update
;
; Adjust the paths (/var/www/church-api), `user`, and the `php` binary for your
; host. For horizontal scaling run several `reverb` nodes behind the TLS proxy
; (deploy/reverb/) with REVERB_SCALING_ENABLED=true so Redis pub/sub fans every
; broadcast out to all nodes.

[program:church-api-reverb]
process_name=%(program_name)s
command=php /var/www/church-api/artisan reverb:start --host=0.0.0.0 --port=8080
directory=/var/www/church-api
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/church-api/storage/logs/reverb.log
stopwaitsecs=10

; Latency-sensitive workload (CHR-159): one GLOBAL fleet draining the queues in
; priority order — broadcasts/push first, then mail, then everything else. The
; tenant is restored per job by stancl, so workers are shared across all churches.
[program:church-api-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/church-api/artisan queue:work redis --queue=broadcast,push,mail,default --sleep=3 --tries=3 --max-time=3600
directory=/var/www/church-api
autostart=true
autorestart=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/church-api/storage/logs/queue.log
stopwaitsecs=3600

; Heavy media/video jobs get their OWN worker so a transcoding burst can never
; starve the latency-sensitive queues above.
[program:church-api-worker-media]
process_name=%(program_name)s
command=php /var/www/church-api/artisan queue:work redis --queue=media --sleep=3 --tries=3 --max-time=3600
directory=/var/www/church-api
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/church-api/storage/logs/queue-media.log
stopwaitsecs=3600

[program:church-api-scheduler]
process_name=%(program_name)s
command=php /var/www/church-api/artisan schedule:work
directory=/var/www/church-api
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/church-api/storage/logs/scheduler.log
stopwaitsecs=10

[group:church-api]
programs=church-api-reverb,church-api-worker,church-api-worker-media,church-api-scheduler
