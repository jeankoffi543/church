name: studio-native CI

# Lint + test on every push/PR that touches the native studio. Fast feedback on
# Linux only; the heavier 3-OS bundling lives in studio-native-release.yml.
on:
  push:
    branches: [main]
    paths: ["studio-native/**", ".github/workflows/studio-native-ci.yml"]
  pull_request:
    paths: ["studio-native/**", ".github/workflows/studio-native-ci.yml"]

# Cancel superseded runs on the same ref.
concurrency:
  group: studio-native-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: studio-native

jobs:
  lint-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # GStreamer + WebKit dev libs the media plane and Tauri link against.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-libav xvfb

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: studio-native

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: studio-native/ui/pnpm-lock.yaml

      - name: Install UI deps
        run: pnpm --dir ui install --frozen-lockfile

      - name: UI typecheck + build
        run: pnpm --dir ui build

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

      # Media tests need an X server; xvfb-run provides a headless one.
      - name: Tests
        run: xvfb-run -a cargo test --workspace --all-features
        env:
          CARGO_INCREMENTAL: 0
