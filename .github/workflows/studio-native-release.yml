name: studio-native release

# Build + bundle the desktop app on all three OSes and attach the installers to a
# GitHub release. Triggered by a version tag (studio-native-v*), or manually.
#
# Signing / notarization are OPTIONAL: the matching secrets are passed through if
# they exist, and skipped otherwise, so the workflow produces *unsigned* bundles
# out of the box and *signed + notarized* ones once the secrets are configured
# (see studio-native/RELEASE.md).
on:
  push:
    tags: ["studio-native-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. studio-native-v0.1.0)"
        required: true

jobs:
  bundle:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            args: ""
          - os: macos-latest
            args: "--target aarch64-apple-darwin"
          - os: macos-13
            args: "--target x86_64-apple-darwin"
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-libav

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS runners cross-compile per-arch; add the matrix target.
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || matrix.os == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: studio-native

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: studio-native/ui/pnpm-lock.yaml

      - name: Install UI deps
        run: pnpm --dir studio-native/ui install --frozen-lockfile

      - name: Build, bundle & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (optional — unsigned if unset).
          ENABLE_CODE_SIGNING: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: studio-native
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Studio Native ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Installateurs de bureau (Linux / macOS / Windows). Voir studio-native/RELEASE.md."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
